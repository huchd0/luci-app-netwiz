name: luci-app-netwiz Build & Release

on:
  # 💡 核心改變：當你在 GitHub 網頁上發佈一個 Release 時，自動觸發此流水線
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk_version: [ "x86_64-23.05.5", "x86_64-snapshot" ]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 💡 魔法步驟：自動讀取 Release 的標籤名 (Tag)，並覆寫到 JS 檔案中
      - name: Auto Inject Version into JS
        run: |
          # 這裡的 github.event.release.tag_name 就會精準抓取你在發佈頁面填寫的標籤 (例如 v1.0.9)
          VERSION_TAG="${{ github.event.release.tag_name }}"
          echo "檢測到新版本發佈，正在將 JS 版本號自動替換為: $VERSION_TAG"
          
          # 替換 JS 中的版本號 (請確保路徑正確，如果你的 js 放在其他資料夾，請修改最後面的路徑)
          sed -i "s/var CURRENT_VERSION = '.*';/var CURRENT_VERSION = '$VERSION_TAG';/g" luci-app-netwiz/root/www/luci-static/resources/view/netwiz.js

      - name: Build LuCI package
        uses: sbwml/openwrt-gh-action-sdk@main   
        env:
          ARCH: ${{ matrix.sdk_version }}
          PACKAGES: luci-app-netwiz
          NO_REFRESH_CHECK: true

      - name: Prepare Fixed-Name Packages
        run: |
          mkdir -p release_pkgs
          find bin/ -name "luci-app-netwiz*.ipk" -exec cp {} release_pkgs/luci-app-netwiz.ipk \;
          find bin/ -name "luci-app-netwiz*.apk" -exec cp {} release_pkgs/luci-app-netwiz.apk \;

      - name: Upload Artifacts to Cloud
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.sdk_version }}
          path: release_pkgs/*
          compression-level: 0 

  release_assets:
    needs: build 
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: final_release
          merge-multiple: true 

      # 💡 把編譯好的安裝包，上傳並附加到你剛剛觸發這個流水線的 Release 頁面中
      - name: Upload Assets to Existing Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: final_release/*
